<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in — Take 139</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f1e8;
  --surface: #efe9dc;
  --surface-2: #e8e1d0;
  --border: #d8cfba;
  --hairline: rgba(29, 29, 27, 0.12);
  --text: #1d1d1b;
  --muted: #5d564b;
  --faint: #8b8475;
  --accent: #8a4a2c;
  --accent-hover: #6f3a23;
  --accent-soft: rgba(138, 74, 44, 0.08);
  --font-heading: 'Fraunces', Georgia, serif;
  --font-body: 'Inter', system-ui, -apple-system, sans-serif;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  background-image:
    radial-gradient(rgba(0,0,0,0.012) 1px, transparent 1px),
    radial-gradient(rgba(0,0,0,0.010) 1px, transparent 1px);
  background-size: 24px 24px, 36px 36px;
  background-position: 0 0, 12px 18px;
  background-attachment: fixed;
}
.wrap {
  max-width: 460px;
  margin: 0 auto;
  padding: 4rem 1.5rem 3rem;
}
.brand {
  font-family: var(--font-body);
  font-size: 0.72rem;
  letter-spacing: 0.32em;
  text-transform: uppercase;
  color: var(--accent);
  font-weight: 600;
  margin-bottom: 0.75rem;
}
.brand a { color: var(--accent); text-decoration: none; }
h1 {
  font-family: var(--font-heading);
  font-size: 2.25rem;
  line-height: 1.1;
  font-weight: 500;
  color: var(--text);
  margin: 0 0 0.5rem 0;
}
.subtitle {
  font-family: var(--font-heading);
  font-style: italic;
  color: var(--muted);
  font-size: 1.05rem;
  margin-bottom: 2rem;
}
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 2rem 1.75rem;
}
.label {
  display: block;
  font-size: 0.72rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: 600;
  margin-bottom: 0.5rem;
}
.input {
  width: 100%;
  font-family: var(--font-body);
  font-size: 1.05rem;
  padding: 0.85rem 1rem;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: #fff;
  color: var(--text);
  outline: none;
  transition: border-color 0.15s;
}
.input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
}
.btn {
  display: block;
  width: 100%;
  margin-top: 1.1rem;
  padding: 0.95rem 1.25rem;
  background: var(--text);
  color: var(--bg);
  font-family: var(--font-body);
  font-size: 0.95rem;
  font-weight: 600;
  letter-spacing: 0.04em;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  transition: background 0.15s;
}
.btn:hover:not(:disabled) { background: #000; }
.btn:disabled { opacity: 0.55; cursor: wait; }
.status {
  margin-top: 1rem;
  font-size: 0.92rem;
  line-height: 1.5;
  min-height: 1.2em;
}
.status.ok { color: var(--accent); }
.status.err { color: #a13544; }
.copy {
  font-size: 0.92rem;
  color: var(--muted);
  margin-bottom: 1.5rem;
  line-height: 1.65;
}
.fine-print {
  margin-top: 1.5rem;
  font-size: 0.82rem;
  color: var(--faint);
  text-align: center;
  line-height: 1.6;
}
.fine-print a { color: var(--accent); text-decoration: none; }
.back-link {
  display: inline-block;
  margin-top: 2rem;
  font-size: 0.85rem;
  color: var(--muted);
  text-decoration: none;
}
.back-link:hover { color: var(--accent); }
</style>
</head>
<body>
<div class="wrap">
  <div class="brand"><a href="/">Take 139</a></div>
  <h1>Sign in</h1>
  <p class="subtitle">Search me, O God, and know my heart.</p>

  <div class="card">
    <p class="copy">Enter the email you used when you took the assessment. We&rsquo;ll send you a one-time sign-in link &mdash; no password to remember.</p>

    <label class="label" for="emailInput">Your email</label>
    <input type="email" class="input" id="emailInput" placeholder="your@email.com" autocomplete="email" autofocus>

    <button class="btn" id="sendBtn" onclick="requestLink()">Send me a sign-in link</button>

    <div class="status" id="status"></div>
  </div>

  <p class="fine-print">Once signed in, you&rsquo;ll see your pair code, your profile, and any partner connection in one place.</p>

  <a href="/" class="back-link">&larr; Back to home</a>
</div>

<script>
const BACKEND_URL = 'https://take139-backend-production.up.railway.app';

async function requestLink() {
  const email = document.getElementById('emailInput').value.trim();
  const status = document.getElementById('status');
  const btn = document.getElementById('sendBtn');

  if (!email || !email.includes('@') || !email.includes('.')) {
    status.textContent = 'Please enter a valid email address.';
    status.className = 'status err';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Sending...';
  status.textContent = '';
  status.className = 'status';

  try {
    const res = await fetch(BACKEND_URL + '/auth/request-magic-link', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({email}),
    });
    if (!res.ok) throw new Error('Server returned ' + res.status);
    const data = await res.json();
    status.textContent = data.message || 'Sign-in link sent. Check your inbox.';
    status.className = 'status ok';
    btn.textContent = 'Sent \u2713 \u2014 check your inbox';
    // Leave button locked so users don't fire 5 requests in a row.
  } catch (err) {
    status.textContent = 'We hit a snag. Please try again in a minute.';
    status.className = 'status err';
    btn.disabled = false;
    btn.textContent = 'Send me a sign-in link';
  }
}

// Submit on Enter
document.getElementById('emailInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') requestLink();
});
</script>
</body>
</html>
