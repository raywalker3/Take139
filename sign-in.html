<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in &mdash; Take 139</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f1e8; --surface: #efe9dc; --surface-2: #e8e1d0;
  --border: #d8cfba; --hairline: rgba(29, 29, 27, 0.12);
  --text: #1d1d1b; --muted: #5d564b; --faint: #8b8475;
  --accent: #8a4a2c; --accent-hover: #6f3a23;
  --accent-soft: rgba(138, 74, 44, 0.08);
  --font-heading: 'Fraunces', Georgia, serif;
  --font-body: 'Inter', system-ui, sans-serif;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--font-body);
  background: var(--bg); color: var(--text);
  line-height: 1.6; min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  background-image:
    radial-gradient(rgba(0,0,0,0.012) 1px, transparent 1px),
    radial-gradient(rgba(0,0,0,0.010) 1px, transparent 1px);
  background-size: 24px 24px, 36px 36px;
  background-position: 0 0, 12px 18px;
  background-attachment: fixed;
}
.wrap { max-width: 460px; margin: 0 auto; padding: 4rem 1.5rem 3rem; }
.brand { font-family: var(--font-body); font-size: 0.72rem; letter-spacing: 0.32em; text-transform: uppercase; color: var(--accent); font-weight: 600; margin-bottom: 0.75rem; }
.brand a { color: var(--accent); text-decoration: none; }
h1 { font-family: var(--font-heading); font-size: 2.25rem; line-height: 1.1; font-weight: 500; color: var(--text); margin: 0 0 0.5rem 0; }
.subtitle { font-family: var(--font-heading); font-style: italic; color: var(--muted); font-size: 1.05rem; margin-bottom: 2rem; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 2rem 1.75rem; }

.tabs { display: flex; gap: 0; margin-bottom: 1.5rem; border-bottom: 1px solid var(--hairline); }
.tab {
  flex: 1; padding: 0.75rem 0; text-align: center;
  font-family: var(--font-body); font-size: 0.88rem; font-weight: 600;
  letter-spacing: 0.04em; color: var(--muted); cursor: pointer;
  background: none; border: none; border-bottom: 2px solid transparent;
  margin-bottom: -1px; transition: color 0.15s, border-color 0.15s;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

.label { display: block; font-size: 0.72rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--muted); font-weight: 600; margin-bottom: 0.5rem; margin-top: 1rem; }
.label:first-of-type { margin-top: 0; }
.input { width: 100%; font-family: var(--font-body); font-size: 1.05rem; padding: 0.85rem 1rem; border: 1px solid var(--border); border-radius: 6px; background: #fff; color: var(--text); outline: none; transition: border-color 0.15s; }
.input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }

.btn { display: block; width: 100%; margin-top: 1.1rem; padding: 0.95rem 1.25rem; background: var(--text); color: var(--bg); font-family: var(--font-body); font-size: 0.95rem; font-weight: 600; letter-spacing: 0.04em; border: none; border-radius: 6px; cursor: pointer; transition: background 0.15s; }
.btn:hover:not(:disabled) { background: #000; }
.btn:disabled { opacity: 0.55; cursor: wait; }

.status { margin-top: 1rem; font-size: 0.92rem; line-height: 1.5; min-height: 1.2em; }
.status.ok { color: var(--accent); }
.status.err { color: #a13544; }

.copy { font-size: 0.92rem; color: var(--muted); margin-bottom: 0; line-height: 1.65; }

.tab-content { display: none; }
.tab-content.active { display: block; }

.fine-print { margin-top: 1.5rem; font-size: 0.85rem; color: var(--muted); text-align: center; line-height: 1.6; }
.fine-print a { color: var(--accent); text-decoration: none; font-weight: 500; }
.fine-print a:hover { text-decoration: underline; }
.alt-link { text-align: center; margin-top: 0.5rem; font-size: 0.85rem; }
.alt-link a { color: var(--muted); text-decoration: underline; cursor: pointer; }

.back-link { display: inline-block; margin-top: 2rem; font-size: 0.85rem; color: var(--muted); text-decoration: none; }
.back-link:hover { color: var(--accent); }
</style>
</head>
<body>
<div class="wrap">
  <div class="brand"><a href="/">Take 139</a></div>
  <h1>Sign in</h1>
  <p class="subtitle">Search me, O God, and know my heart.</p>

  <div class="card">
    <div class="tabs">
      <button class="tab active" id="tabPassword" onclick="switchTab('password')">Password</button>
      <button class="tab" id="tabLink" onclick="switchTab('link')">Email link</button>
    </div>

    <!-- ===== Password tab ===== -->
    <div class="tab-content active" id="passwordTab">
      <label class="label" for="pwEmail">Your email</label>
      <input type="email" class="input" id="pwEmail" placeholder="your@email.com" autocomplete="email">

      <label class="label" for="pwPassword">Password</label>
      <input type="password" class="input" id="pwPassword" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;" autocomplete="current-password">

      <button class="btn" id="pwBtn" onclick="signInWithPassword()">Sign in</button>

      <div class="alt-link"><a onclick="forgotPassword()">Forgot password?</a></div>

      <div class="status" id="pwStatus"></div>
    </div>

    <!-- ===== Email link tab ===== -->
    <div class="tab-content" id="linkTab">
      <p class="copy" style="margin-bottom:1.25rem;">Enter the email you used and we&rsquo;ll send a one-time sign-in link &mdash; no password required.</p>

      <label class="label" for="lkEmail">Your email</label>
      <input type="email" class="input" id="lkEmail" placeholder="your@email.com" autocomplete="email">

      <button class="btn" id="lkBtn" onclick="requestLink()">Send me a sign-in link</button>

      <div class="status" id="lkStatus"></div>
    </div>
  </div>

  <p class="fine-print">Don&rsquo;t have an account? <a href="/signup.html">Create one</a></p>

  <a href="/" class="back-link">&larr; Back to home</a>
</div>

<script>
const BACKEND_URL = 'https://take139-backend-production.up.railway.app';

function switchTab(which) {
  document.getElementById('tabPassword').classList.toggle('active', which==='password');
  document.getElementById('tabLink').classList.toggle('active', which==='link');
  document.getElementById('passwordTab').classList.toggle('active', which==='password');
  document.getElementById('linkTab').classList.toggle('active', which==='link');
}

function saveSession(token, email) {
  try {
    localStorage.setItem('t139_session_token', token);
    localStorage.setItem('t139_session_email', email);
  } catch(e) {
    sessionStorage.setItem('t139_session_token', token);
    sessionStorage.setItem('t139_session_email', email);
  }
}

async function signInWithPassword() {
  const email = document.getElementById('pwEmail').value.trim();
  const pw = document.getElementById('pwPassword').value;
  const btn = document.getElementById('pwBtn');
  const status = document.getElementById('pwStatus');

  if (!email || !email.includes('@')) {
    status.textContent = 'Please enter a valid email address.';
    status.className = 'status err';
    return;
  }
  if (!pw) {
    status.textContent = 'Please enter your password.';
    status.className = 'status err';
    return;
  }
  btn.disabled = true; btn.textContent = 'Signing in...';
  status.textContent = ''; status.className = 'status';

  try {
    const res = await fetch(BACKEND_URL + '/auth/signin-password', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({email, password: pw}),
    });
    if (!res.ok) {
      let msg = 'Email or password is incorrect.';
      try { const d = await res.json(); if (d && d.detail) msg = d.detail; } catch(_){}
      status.textContent = msg; status.className = 'status err';
      btn.disabled = false; btn.textContent = 'Sign in';
      return;
    }
    const data = await res.json();
    saveSession(data.session_token, data.email);
    status.textContent = 'Signed in. Loading your dashboard\u2026';
    status.className = 'status ok';
    btn.textContent = 'Signed in \u2713';
    setTimeout(() => { window.location.href = '/dashboard.html'; }, 400);
  } catch(err) {
    status.textContent = 'We could not reach the server. Please try again.';
    status.className = 'status err';
    btn.disabled = false; btn.textContent = 'Sign in';
  }
}

async function requestLink() {
  const email = document.getElementById('lkEmail').value.trim();
  const btn = document.getElementById('lkBtn');
  const status = document.getElementById('lkStatus');

  if (!email || !email.includes('@')) {
    status.textContent = 'Please enter a valid email address.';
    status.className = 'status err';
    return;
  }
  btn.disabled = true; btn.textContent = 'Sending...';
  status.textContent = ''; status.className = 'status';

  try {
    const res = await fetch(BACKEND_URL + '/auth/request-magic-link', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({email}),
    });
    if (!res.ok) throw new Error('Server returned ' + res.status);
    const data = await res.json();
    status.textContent = data.message || 'Sign-in link sent. Check your inbox.';
    status.className = 'status ok';
    btn.textContent = 'Sent \u2713 \u2014 check your inbox';
  } catch(err) {
    status.textContent = 'We hit a snag. Please try again in a minute.';
    status.className = 'status err';
    btn.disabled = false; btn.textContent = 'Send me a sign-in link';
  }
}

function forgotPassword() {
  // Auto-fill the magic-link tab with whatever email is in the password field,
  // then switch and (if email is valid) send the link.
  const pwEmail = document.getElementById('pwEmail').value.trim();
  document.getElementById('lkEmail').value = pwEmail;
  switchTab('link');
  if (pwEmail && pwEmail.includes('@')) {
    requestLink();
  } else {
    document.getElementById('lkEmail').focus();
  }
}

// Enter-to-submit on each tab
document.getElementById('pwPassword').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') signInWithPassword();
});
document.getElementById('lkEmail').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') requestLink();
});
</script>
</body>
</html>
